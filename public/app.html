<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis AI - Even G2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, 'SF Pro Text', sans-serif;
      background: #0a0a0a; color: #e0e0e0;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* Header */
    header {
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: center; gap: 10px;
    }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #333; transition: background 0.3s;
    }
    header .dot.online { background: #00cc66; }
    header .dot.listening { background: #ff6600; animation: pulse 1s infinite; }
    header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    header .state-badge {
      margin-left: auto; font-size: 11px;
      padding: 3px 8px; border-radius: 10px;
      background: #1a1a1a; color: #888;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Chat area */
    #chat {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg {
      max-width: 85%; padding: 8px 12px;
      border-radius: 12px; font-size: 14px;
      line-height: 1.4; word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a3a2a; color: #a0e8c0;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1a1a2a; color: #c0c8e8;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: none; color: #555;
      font-size: 12px; padding: 4px 0;
    }
    .msg .label {
      font-size: 10px; font-weight: 600;
      margin-bottom: 2px; opacity: 0.6;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* G2 display mirror */
    #g2-display {
      margin: 0 16px; padding: 10px 14px;
      background: #000; border: 1px solid #222;
      border-radius: 8px; font-size: 13px;
      color: #00ff88; font-family: 'SF Mono', monospace;
      min-height: 60px; white-space: pre-wrap;
      word-wrap: break-word;
    }
    #g2-display .page-indicator {
      font-size: 10px; color: #005533;
      text-align: right; margin-top: 4px;
    }

    /* Log */
    #log {
      font-size: 10px; color: #444;
      max-height: 120px; overflow-y: auto;
      padding: 8px 16px;
      border-top: 1px solid #111;
    }
    .log-entry { margin-bottom: 1px; font-family: 'SF Mono', monospace; }
    .err { color: #cc4444; }
  </style>
</head>
<body>
  <header>
    <div class="dot" id="statusDot"></div>
    <h1>Jarvis</h1>
    <div class="state-badge" id="stateBadge">...</div>
  </header>

  <div id="chat"></div>

  <div id="g2-display">
    <div id="g2Text">--</div>
    <div class="page-indicator" id="g2Page"></div>
  </div>

  <div id="log"></div>

  <script type="module">
    // ─── Configuration ───────────────────────────────────────
    const BRIDGE_WS_URL = '%%WS_URL%%';
    const CONTAINER_ID = 1;
    const CONTAINER_NAME = 'main';

    // ─── State ───────────────────────────────────────────────
    let state = 'INIT';
    let bridge = null;
    let ws = null;
    let audioSeq = 0;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 5;

    // ─── UI Elements ─────────────────────────────────────────
    const statusDot = document.getElementById('statusDot');
    const stateBadge = document.getElementById('stateBadge');
    const chatEl = document.getElementById('chat');
    const g2Text = document.getElementById('g2Text');
    const g2Page = document.getElementById('g2Page');
    const logEl = document.getElementById('log');

    function log(msg, isError = false) {
      console.log(`[Jarvis] ${msg}`);
      const div = document.createElement('div');
      div.className = 'log-entry' + (isError ? ' err' : '');
      div.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      logEl.prepend(div);
      while (logEl.children.length > 50) logEl.lastChild.remove();
    }

    function setState(newState) {
      state = newState;
      stateBadge.textContent = newState;

      statusDot.className = 'dot';
      if (newState === 'IDLE') statusDot.classList.add('online');
      else if (newState === 'LISTENING') statusDot.classList.add('listening');
      else if (newState !== 'INIT') statusDot.classList.add('online');

      log(`State → ${state}`);
    }

    function addChatMessage(role, text) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      if (role === 'user') {
        msg.innerHTML = `<div class="label">Tu</div>${escapeHtml(text)}`;
      } else if (role === 'assistant') {
        msg.innerHTML = `<div class="label">Jarvis</div>${escapeHtml(text)}`;
      } else {
        msg.textContent = text;
      }
      chatEl.appendChild(msg);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ─── G2 Display helpers ──────────────────────────────────
    async function g2Show(text) {
      g2Text.textContent = text;
      g2Page.textContent = '';
      if (!bridge) return;
      try {
        await bridge.textContainerUpgrade({
          containerID: CONTAINER_ID,
          containerName: CONTAINER_NAME,
          content: text
        });
      } catch (e) {
        log(`Display error: ${e.message}`, true);
      }
    }

    // ─── Even Hub SDK Initialization ─────────────────────────
    async function initBridge() {
      log('Loading Even Hub SDK...');

      try {
        const sdk = await import('https://esm.sh/@evenrealities/even_hub_sdk');

        if (sdk.waitForEvenAppBridge) {
          log('SDK loaded, waiting for bridge...');
          bridge = await sdk.waitForEvenAppBridge();
        } else if (sdk.EvenAppBridge) {
          bridge = sdk.EvenAppBridge.getInstance();
        }

        log('Bridge ready via SDK');
        await setupDisplay(sdk);
        setupEvents();
        return;
      } catch (e) {
        log(`SDK import failed: ${e.message}`, true);
      }

      log('Trying window global fallback...');
      bridge = await new Promise((resolve, reject) => {
        let attempts = 0;
        const check = () => {
          attempts++;
          const b = window.EvenAppBridge
            || window.evenAppBridge
            || window.bridge;
          if (b) {
            const inst = typeof b.getInstance === 'function' ? b.getInstance() : b;
            resolve(inst);
          } else if (attempts > 50) {
            reject(new Error('Bridge not found after 5s'));
          } else {
            setTimeout(check, 100);
          }
        };
        check();
      });

      log('Bridge ready via global');
      await setupDisplay(null);
      setupEvents();
    }

    async function setupDisplay(sdk) {
      log('Creating display container...');

      const containerConfig = {
        containerID: CONTAINER_ID,
        containerName: CONTAINER_NAME,
        xPosition: 0,
        yPosition: 0,
        width: 576,
        height: 288,
        content: 'Jarvis AI\nTap to speak',
        borderWidth: 0,
        borderColor: 0,
        borderRdaius: 0,
        paddingLength: 8,
        isEventCapture: 1
      };

      try {
        let result;

        if (sdk && sdk.CreateStartUpPageContainer && sdk.TextContainerProperty) {
          result = await bridge.createStartUpPageContainer(
            new sdk.CreateStartUpPageContainer({
              containerTotalNum: 1,
              textObject: [new sdk.TextContainerProperty(containerConfig)]
            })
          );
          log(`createStartUp result: ${result}`);

          if (result === 1 || result === '1') {
            log('Container already exists, rebuilding...');
            if (sdk.RebuildPageContainer) {
              const rebuildResult = await bridge.rebuildPageContainer(
                new sdk.RebuildPageContainer({
                  containerTotalNum: 1,
                  textObject: [new sdk.TextContainerProperty(containerConfig)]
                })
              );
              log(`rebuild result: ${rebuildResult}`);
            } else {
              const rebuildResult = await bridge.callEvenApp('rebuildPageContainer', {
                containerTotalNum: 1,
                textObject: [containerConfig]
              });
              log(`rebuild via callEvenApp result: ${rebuildResult}`);
            }
          }
        } else {
          result = await bridge.callEvenApp('createStartUpPageContainer', {
            containerTotalNum: 1,
            textObject: [containerConfig]
          });
          log(`createStartUp via callEvenApp result: ${result}`);

          if (result === 1 || result === '1') {
            log('Container already exists, rebuilding...');
            const rebuildResult = await bridge.callEvenApp('rebuildPageContainer', {
              containerTotalNum: 1,
              textObject: [containerConfig]
            });
            log(`rebuild via callEvenApp result: ${rebuildResult}`);
          }
        }
      } catch (e) {
        log(`Container error: ${e.message}`, true);
      }
    }

    function setupEvents() {
      log('Registering event handlers...');

      const methods = Object.getOwnPropertyNames(Object.getPrototypeOf(bridge))
        .filter(m => m !== 'constructor');
      log(`Bridge methods: ${methods.join(', ')}`);

      if (typeof bridge.onEvenHubEvent === 'function') {
        log('Using onEvenHubEvent');
        bridge.onEvenHubEvent(handleEvent);
      } else {
        log('onEvenHubEvent NOT found!', true);
        const altMethods = ['addEventListener', 'on', 'onEvent', 'setEventCallback',
          'registerEventHandler', 'onGlassesEvent', 'onInputEvent'];
        for (const m of altMethods) {
          if (typeof bridge[m] === 'function') {
            log(`Trying alt method: ${m}`);
            try {
              bridge[m](handleEvent);
              log(`Registered via ${m}`);
              break;
            } catch (e) {
              log(`${m} failed: ${e.message}`, true);
            }
          }
        }
      }

      log('Events setup done');
    }

    function handleEvent(event) {
      try {
        const raw = JSON.stringify(event, (key, val) => {
          if (val instanceof Uint8Array) return `Uint8Array(${val.length})`;
          return val;
        });
        log(`EVENT RAW: ${raw}`);
      } catch (e) {
        log(`EVENT (not serializable): ${typeof event} keys=${Object.keys(event||{})}`);
      }

      // ─── Touch / click events ──────────────────────
      if (event.textEvent) {
        const evType = event.textEvent.eventType;
        log(`textEvent type=${evType}`);
        if (evType === 0 || evType === undefined) handleTap();
        else if (evType === 1) handleScrollUp();
        else if (evType === 2) {
          if (state === 'DISPLAYING') handleScrollDown();
          else handleDoubleTap();
        }
        else if (evType === 3) handleDoubleTap();
      }

      if (event.listEvent) {
        const evType = event.listEvent.eventType;
        log(`listEvent type=${evType} item=${event.listEvent.currentSelectItemName}`);
        if (evType === 0 || evType === undefined) handleTap();
        else if (evType === 3) handleDoubleTap();
        else if (evType === 2) handleScrollDown();
        else if (evType === 1) handleScrollUp();
      }

      // ─── Audio PCM data ────────────────────────────
      if (event.audioEvent && event.audioEvent.audioPcm) {
        log(`Audio PCM: ${event.audioEvent.audioPcm.length} bytes`);
        handleAudioPcm(event.audioEvent.audioPcm);
      }

      // ─── System events ─────────────────────────────
      if (event.sysEvent) {
        const evType = event.sysEvent.eventType;
        log(`sysEvent type=${evType}`);
        if (evType === 3) handleTap();
        else if (evType === 5) log('App backgrounded');
        else if (evType === 4) log('App foregrounded');
        else if (evType === 6) log('Abnormal exit', true);
      }

      if (!event.textEvent && !event.listEvent && !event.audioEvent && !event.sysEvent) {
        log(`Unknown event shape. Keys: ${Object.keys(event||{}).join(',')}`);
      }
    }

    // ─── Interaction handlers ────────────────────────────────

    function handleTap() {
      log(`Tap in state: ${state}`);

      if (state === 'IDLE' || state === 'DISPLAYING') {
        startRecording();
      } else if (state === 'LISTENING') {
        stopRecording();
      }
    }

    function handleDoubleTap() {
      log('Double tap → reset');
      if (state === 'LISTENING') {
        bridge.audioControl(false).catch(() => {});
      }
      wsSend({ type: 'touchbar', event: 'DOUBLE_TAP' });
      setState('IDLE');
      g2Show('Jarvis AI\nTap to speak');
    }

    function handleScrollDown() {
      if (state === 'DISPLAYING') {
        log('Scroll down → next page');
        wsSend({ type: 'touchbar', event: 'TAP' });
      }
    }

    function handleScrollUp() {
      if (state === 'DISPLAYING') {
        log('Scroll up → prev page');
        wsSend({ type: 'page_prev' });
      }
    }

    async function startRecording() {
      log('>>> startRecording called');
      setState('LISTENING');
      audioSeq = 0;
      await g2Show('🎤 Ascoltando...');
      wsSend({ type: 'touchbar', event: 'LONG_PRESS_START' });

      try {
        log('Calling audioControl(true)...');
        await bridge.audioControl(true);
        log('Mic ON - speak now');
      } catch (e) {
        log(`Mic error: ${e.message}`, true);
        setState('IDLE');
        await g2Show('Mic error\nTap to retry');
      }
    }

    async function stopRecording() {
      setState('PROCESSING');
      g2Show('⏳ Elaboro...');

      try {
        await bridge.audioControl(false);
        log('Mic OFF');
      } catch (e) {
        log(`Mic off error: ${e.message}`, true);
      }

      wsSend({ type: 'audio_end' });
    }

    function handleAudioPcm(pcmData) {
      if (state !== 'LISTENING') return;
      const base64 = uint8ToBase64(pcmData);
      wsSend({
        type: 'audio_pcm',
        data: base64,
        sequence: audioSeq++
      });
    }

    // ─── WebSocket to Bridge ─────────────────────────────────

    function connectWs() {
      log(`Connecting to ${BRIDGE_WS_URL}...`);

      ws = new WebSocket(BRIDGE_WS_URL);

      ws.onopen = () => {
        reconnectAttempts = 0;
        log('Bridge connected');
        setState('IDLE');
        g2Show('Jarvis AI\nTap to speak');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleBridgeMessage(msg);
        } catch (e) {
          log(`Parse error: ${e.message}`, true);
        }
      };

      ws.onclose = () => {
        log('Bridge disconnected');
        scheduleReconnect();
      };

      ws.onerror = (e) => {
        log('WS error', true);
      };
    }

    function scheduleReconnect() {
      if (reconnectAttempts >= MAX_RECONNECT) {
        log('Max reconnect attempts', true);
        g2Show('Offline\nRestart app');
        return;
      }
      reconnectAttempts++;
      const delay = Math.min(2000 * Math.pow(2, reconnectAttempts - 1), 30000);
      log(`Reconnecting in ${delay}ms (${reconnectAttempts}/${MAX_RECONNECT})`);
      setTimeout(connectWs, delay);
    }

    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      } else {
        log('WS not connected, message dropped', true);
      }
    }

    function handleBridgeMessage(msg) {
      log(`Bridge: ${msg.type}`);

      switch (msg.type) {
        case 'status':
          g2Show(msg.message || '');
          break;

        case 'display':
          setState('DISPLAYING');
          const displayText = msg.text || '';
          g2Text.textContent = displayText;
          if (msg.total && msg.total > 1) {
            g2Page.textContent = `${msg.page}/${msg.total}`;
          } else {
            g2Page.textContent = '';
          }
          // Also update glasses
          if (bridge) {
            bridge.textContainerUpgrade({
              containerID: CONTAINER_ID,
              containerName: CONTAINER_NAME,
              content: displayText + (msg.total > 1 ? `\n[${msg.page}/${msg.total}]` : '')
            }).catch(() => {});
          }
          break;

        case 'chat_update':
          // New: add message to chat UI
          if (msg.role && msg.text) {
            addChatMessage(msg.role, msg.text);
          }
          break;

        case 'clear':
          g2Show('');
          break;

        case 'error':
          addChatMessage('system', msg.message || 'Error');
          g2Show(msg.message || 'Error');
          setTimeout(() => {
            if (state !== 'LISTENING') {
              setState('IDLE');
            }
          }, 3000);
          break;

        case 'state':
          if (msg.state === 'IDLE') {
            setState('IDLE');
          }
          break;
      }
    }

    // ─── Utilities ───────────────────────────────────────────

    function uint8ToBase64(uint8) {
      let binary = '';
      const len = uint8.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(uint8[i]);
      }
      return btoa(binary);
    }

    // ─── Boot ────────────────────────────────────────────────

    async function main() {
      log('Jarvis AI starting...');

      try {
        await initBridge();
        log('G2 bridge initialized');
      } catch (e) {
        log(`Bridge init failed: ${e.message}`, true);
      }

      connectWs();
    }

    main();
  </script>
</body>
</html>
