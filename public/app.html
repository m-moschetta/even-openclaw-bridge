<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>J.A.R.V.I.S. - Even G2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500;600&display=swap');

    :root {
      --arc-blue: #0af;
      --arc-cyan: #0ff;
      --arc-dim: #046;
      --arc-glow: rgba(0,170,255,0.15);
      --hud-orange: #f80;
      --hud-red: #f33;
      --bg: #050810;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg); color: #c0d8f0;
      min-height: 100vh; display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ─── Animated background grid ───────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        linear-gradient(rgba(0,170,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,170,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
    }
    @keyframes gridScroll {
      to { background-position: 40px 40px; }
    }

    /* ─── Header / HUD bar ───────────────────────── */
    header {
      position: relative; z-index: 10;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(0,170,255,0.08) 0%, transparent 100%);
      border-bottom: 1px solid rgba(0,170,255,0.2);
      display: flex; align-items: center; gap: 12px;
    }

    .arc-reactor {
      width: 32px; height: 32px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .arc-reactor .ring {
      position: absolute; inset: 0;
      border: 2px solid var(--arc-dim);
      border-top-color: var(--arc-blue);
      border-radius: 50%;
      animation: arcSpin 3s linear infinite;
    }
    .arc-reactor .ring.inner {
      inset: 5px;
      border-width: 1.5px;
      border-top-color: var(--arc-cyan);
      animation-duration: 2s;
      animation-direction: reverse;
    }
    .arc-reactor .core {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--arc-blue);
      box-shadow: 0 0 8px var(--arc-blue), 0 0 20px var(--arc-glow);
      transition: all 0.3s;
    }
    .arc-reactor.listening .core {
      background: var(--hud-orange);
      box-shadow: 0 0 12px var(--hud-orange), 0 0 30px rgba(255,136,0,0.3);
      animation: corePulse 0.8s ease infinite;
    }
    .arc-reactor.processing .ring { border-top-color: var(--arc-cyan); animation-duration: 0.5s; }
    .arc-reactor.processing .ring.inner { animation-duration: 0.3s; }

    @keyframes arcSpin { to { transform: rotate(360deg); } }
    @keyframes corePulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }

    .hud-title {
      font-family: 'Orbitron', monospace;
      font-size: 15px; font-weight: 500;
      color: var(--arc-blue);
      letter-spacing: 3px;
      text-shadow: 0 0 10px var(--arc-glow);
    }

    .hud-status {
      margin-left: auto;
      font-family: 'Orbitron', monospace;
      font-size: 9px; letter-spacing: 1px;
      padding: 3px 10px; border-radius: 2px;
      border: 1px solid var(--arc-dim);
      color: var(--arc-blue);
      text-transform: uppercase;
      transition: all 0.3s;
    }
    .hud-status.listening { border-color: var(--hud-orange); color: var(--hud-orange); }
    .hud-status.error { border-color: var(--hud-red); color: var(--hud-red); }

    /* ─── Chat area ──────────────────────────────── */
    #chat {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      position: relative; z-index: 5;
      scrollbar-width: thin;
      scrollbar-color: var(--arc-dim) transparent;
    }

    .msg {
      max-width: 88%; padding: 10px 14px;
      font-size: 14px; line-height: 1.5;
      word-wrap: break-word;
      animation: msgIn 0.3s ease;
      position: relative;
    }
    .msg.user {
      align-self: flex-end;
      background: rgba(0,170,255,0.08);
      border: 1px solid rgba(0,170,255,0.2);
      border-radius: 12px 12px 4px 12px;
      color: #a0d4f0;
    }
    .msg.user::after {
      content: '';
      position: absolute; top: 0; right: -4px;
      width: 12px; height: 12px;
      background: linear-gradient(135deg, rgba(0,170,255,0.2) 50%, transparent 50%);
    }
    .msg.assistant {
      align-self: flex-start;
      background: rgba(0,255,255,0.04);
      border: 1px solid rgba(0,255,255,0.12);
      border-radius: 12px 12px 12px 4px;
      color: #c0e8f0;
    }
    .msg.assistant::before {
      content: '';
      position: absolute; top: -1px; left: 0;
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--arc-cyan), transparent);
    }
    .msg.system {
      align-self: center;
      background: none; color: #445;
      font-size: 11px; padding: 4px 0;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.5px;
    }
    .msg .label {
      font-family: 'Orbitron', monospace;
      font-size: 9px; font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .msg.user .label { color: var(--arc-blue); }
    .msg.assistant .label { color: var(--arc-cyan); }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── G2 HUD Mirror ──────────────────────────── */
    #g2-display {
      position: relative; z-index: 5;
      margin: 8px 16px 6px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,170,255,0.15);
      border-radius: 4px;
      font-family: 'Rajdhani', monospace;
      font-size: 13px; font-weight: 400;
      color: var(--arc-cyan);
      min-height: 50px;
      white-space: pre-wrap; word-wrap: break-word;
    }
    #g2-display::before {
      content: 'G2 HUD';
      position: absolute; top: -8px; left: 12px;
      font-family: 'Orbitron', monospace;
      font-size: 8px; letter-spacing: 2px;
      color: var(--arc-dim);
      background: var(--bg);
      padding: 0 6px;
    }
    #g2-display::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--arc-blue), transparent);
    }
    #g2-display .page-indicator {
      font-family: 'Orbitron', monospace;
      font-size: 9px; color: var(--arc-dim);
      text-align: right; margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ─── Log ────────────────────────────────────── */
    #log {
      position: relative; z-index: 5;
      font-size: 9px; color: #334;
      max-height: 80px; overflow-y: auto;
      padding: 6px 16px;
      border-top: 1px solid rgba(0,170,255,0.06);
      font-family: 'SF Mono', 'Fira Code', monospace;
      scrollbar-width: none;
    }
    .log-entry { margin-bottom: 1px; }
    .err { color: var(--hud-red); }

    /* ─── Scan line overlay ──────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 2;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="arc-reactor" id="arcReactor">
      <div class="ring"></div>
      <div class="ring inner"></div>
      <div class="core"></div>
    </div>
    <div class="hud-title">J.A.R.V.I.S.</div>
    <div class="hud-status" id="stateBadge">INIT</div>
  </header>

  <div id="chat"></div>

  <div id="g2-display">
    <div id="g2Text">--</div>
    <div class="page-indicator" id="g2Page"></div>
  </div>

  <div id="log"></div>

  <script type="module">
    const BRIDGE_WS_URL = '%%WS_URL%%';
    const CONTAINER_ID = 1;
    const CONTAINER_NAME = 'main';

    let state = 'INIT';
    let bridge = null;
    let ws = null;
    let audioSeq = 0;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 5;

    const arcReactor = document.getElementById('arcReactor');
    const stateBadge = document.getElementById('stateBadge');
    const chatEl = document.getElementById('chat');
    const g2Text = document.getElementById('g2Text');
    const g2Page = document.getElementById('g2Page');
    const logEl = document.getElementById('log');

    function log(msg, isError = false) {
      console.log(`[Jarvis] ${msg}`);
      const div = document.createElement('div');
      div.className = 'log-entry' + (isError ? ' err' : '');
      div.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      logEl.prepend(div);
      while (logEl.children.length > 50) logEl.lastChild.remove();
    }

    function setState(newState) {
      state = newState;
      stateBadge.textContent = newState;
      stateBadge.className = 'hud-status';

      arcReactor.className = 'arc-reactor';
      if (newState === 'LISTENING') {
        arcReactor.classList.add('listening');
        stateBadge.classList.add('listening');
      } else if (newState === 'PROCESSING' || newState === 'TRANSCRIBING') {
        arcReactor.classList.add('processing');
      }

      log(`State → ${state}`);
    }

    function addChatMessage(role, text) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      if (role === 'user') {
        msg.innerHTML = `<div class="label">Operatore</div>${escapeHtml(text)}`;
      } else if (role === 'assistant') {
        msg.innerHTML = `<div class="label">J.A.R.V.I.S.</div>${escapeHtml(text)}`;
      } else {
        msg.textContent = text;
      }
      chatEl.appendChild(msg);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function g2Show(text) {
      g2Text.textContent = text;
      g2Page.textContent = '';
      if (!bridge) return;
      try {
        await bridge.textContainerUpgrade({
          containerID: CONTAINER_ID,
          containerName: CONTAINER_NAME,
          content: text
        });
      } catch (e) {
        log(`Display error: ${e.message}`, true);
      }
    }

    // ─── Even Hub SDK Initialization ─────────────────────────
    async function initBridge() {
      log('Initializing neural interface...');

      try {
        const sdk = await import('https://esm.sh/@evenrealities/even_hub_sdk');

        if (sdk.waitForEvenAppBridge) {
          log('SDK loaded, waiting for bridge...');
          bridge = await sdk.waitForEvenAppBridge();
        } else if (sdk.EvenAppBridge) {
          bridge = sdk.EvenAppBridge.getInstance();
        }

        log('Bridge ready via SDK');
        await setupDisplay(sdk);
        setupEvents();
        return;
      } catch (e) {
        log(`SDK import failed: ${e.message}`, true);
      }

      log('Trying window global fallback...');
      bridge = await new Promise((resolve, reject) => {
        let attempts = 0;
        const check = () => {
          attempts++;
          const b = window.EvenAppBridge || window.evenAppBridge || window.bridge;
          if (b) {
            resolve(typeof b.getInstance === 'function' ? b.getInstance() : b);
          } else if (attempts > 50) {
            reject(new Error('Bridge not found after 5s'));
          } else {
            setTimeout(check, 100);
          }
        };
        check();
      });

      log('Bridge ready via global');
      await setupDisplay(null);
      setupEvents();
    }

    async function setupDisplay(sdk) {
      log('Creating HUD container...');

      const containerConfig = {
        containerID: CONTAINER_ID,
        containerName: CONTAINER_NAME,
        xPosition: 0, yPosition: 0,
        width: 576, height: 288,
        content: 'J.A.R.V.I.S.\nSistema pronto',
        borderWidth: 0, borderColor: 0,
        borderRdaius: 0, paddingLength: 8,
        isEventCapture: 1
      };

      try {
        let result;
        if (sdk && sdk.CreateStartUpPageContainer && sdk.TextContainerProperty) {
          result = await bridge.createStartUpPageContainer(
            new sdk.CreateStartUpPageContainer({
              containerTotalNum: 1,
              textObject: [new sdk.TextContainerProperty(containerConfig)]
            })
          );
          log(`createStartUp result: ${result}`);
          if (result === 1 || result === '1') {
            log('Container exists, rebuilding...');
            if (sdk.RebuildPageContainer) {
              await bridge.rebuildPageContainer(
                new sdk.RebuildPageContainer({
                  containerTotalNum: 1,
                  textObject: [new sdk.TextContainerProperty(containerConfig)]
                })
              );
            } else {
              await bridge.callEvenApp('rebuildPageContainer', {
                containerTotalNum: 1, textObject: [containerConfig]
              });
            }
          }
        } else {
          result = await bridge.callEvenApp('createStartUpPageContainer', {
            containerTotalNum: 1, textObject: [containerConfig]
          });
          if (result === 1 || result === '1') {
            await bridge.callEvenApp('rebuildPageContainer', {
              containerTotalNum: 1, textObject: [containerConfig]
            });
          }
        }
      } catch (e) {
        log(`Container error: ${e.message}`, true);
      }
    }

    function setupEvents() {
      log('Registering event handlers...');
      const methods = Object.getOwnPropertyNames(Object.getPrototypeOf(bridge))
        .filter(m => m !== 'constructor');
      log(`Bridge methods: ${methods.join(', ')}`);

      if (typeof bridge.onEvenHubEvent === 'function') {
        bridge.onEvenHubEvent(handleEvent);
      } else {
        const altMethods = ['addEventListener', 'on', 'onEvent', 'setEventCallback',
          'registerEventHandler', 'onGlassesEvent', 'onInputEvent'];
        for (const m of altMethods) {
          if (typeof bridge[m] === 'function') {
            try { bridge[m](handleEvent); break; } catch {}
          }
        }
      }
      log('Events online');
    }

    function handleEvent(event) {
      try {
        const raw = JSON.stringify(event, (key, val) => {
          if (val instanceof Uint8Array) return `Uint8Array(${val.length})`;
          return val;
        });
        log(`EVENT: ${raw}`);
      } catch {}

      if (event.textEvent) {
        const t = event.textEvent.eventType;
        if (t === 0 || t === undefined) handleTap();
        else if (t === 1) handleScrollUp();
        else if (t === 2) { state === 'DISPLAYING' ? handleScrollDown() : handleDoubleTap(); }
        else if (t === 3) handleDoubleTap();
      }
      if (event.listEvent) {
        const t = event.listEvent.eventType;
        if (t === 0 || t === undefined) handleTap();
        else if (t === 3) handleDoubleTap();
        else if (t === 2) handleScrollDown();
        else if (t === 1) handleScrollUp();
      }
      if (event.audioEvent && event.audioEvent.audioPcm) {
        handleAudioPcm(event.audioEvent.audioPcm);
      }
      if (event.sysEvent) {
        const t = event.sysEvent.eventType;
        if (t === 3) handleTap();
      }
    }

    function handleTap() {
      if (state === 'IDLE' || state === 'DISPLAYING') startRecording();
      else if (state === 'LISTENING') stopRecording();
    }

    function handleDoubleTap() {
      if (state === 'LISTENING') bridge.audioControl(false).catch(() => {});
      wsSend({ type: 'touchbar', event: 'DOUBLE_TAP' });
      setState('IDLE');
      g2Show('J.A.R.V.I.S.\nSistema pronto');
    }

    function handleScrollDown() {
      if (state === 'DISPLAYING') wsSend({ type: 'touchbar', event: 'TAP' });
    }
    function handleScrollUp() {
      if (state === 'DISPLAYING') wsSend({ type: 'page_prev' });
    }

    async function startRecording() {
      setState('LISTENING');
      audioSeq = 0;
      await g2Show('[REC] In ascolto...');
      wsSend({ type: 'touchbar', event: 'LONG_PRESS_START' });
      try {
        await bridge.audioControl(true);
        log('Mic ON');
      } catch (e) {
        log(`Mic error: ${e.message}`, true);
        setState('IDLE');
        await g2Show('ERR: Mic offline\nTap to retry');
      }
    }

    async function stopRecording() {
      setState('PROCESSING');
      g2Show('[...] Elaborazione');
      try { await bridge.audioControl(false); } catch {}
      wsSend({ type: 'audio_end' });
    }

    function handleAudioPcm(pcmData) {
      if (state !== 'LISTENING') return;
      wsSend({ type: 'audio_pcm', data: uint8ToBase64(pcmData), sequence: audioSeq++ });
    }

    // ─── WebSocket ───────────────────────────────────────────

    function connectWs() {
      log(`Connecting to ${BRIDGE_WS_URL}...`);
      ws = new WebSocket(BRIDGE_WS_URL);

      ws.onopen = () => {
        reconnectAttempts = 0;
        log('Uplink established');
        setState('IDLE');
        g2Show('J.A.R.V.I.S.\nSistema pronto');
      };

      ws.onmessage = (event) => {
        try { handleBridgeMessage(JSON.parse(event.data)); } catch {}
      };

      ws.onclose = () => { log('Uplink lost'); scheduleReconnect(); };
      ws.onerror = () => { log('WS error', true); };
    }

    function scheduleReconnect() {
      if (reconnectAttempts >= MAX_RECONNECT) {
        log('Max reconnect', true);
        g2Show('OFFLINE\nRestart required');
        return;
      }
      reconnectAttempts++;
      setTimeout(connectWs, Math.min(2000 * Math.pow(2, reconnectAttempts - 1), 30000));
    }

    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
    }

    function handleBridgeMessage(msg) {
      switch (msg.type) {
        case 'status':
          g2Show(msg.message || '');
          break;

        case 'display':
          setState('DISPLAYING');
          g2Text.textContent = msg.text || '';
          g2Page.textContent = msg.total > 1 ? `PAGE ${msg.page}/${msg.total}` : '';
          if (bridge) {
            bridge.textContainerUpgrade({
              containerID: CONTAINER_ID, containerName: CONTAINER_NAME,
              content: (msg.text || '') + (msg.total > 1 ? `\n[${msg.page}/${msg.total}]` : '')
            }).catch(() => {});
          }
          break;

        case 'chat_update':
          if (msg.role && msg.text) addChatMessage(msg.role, msg.text);
          break;

        case 'clear':
          g2Show('');
          break;

        case 'error':
          addChatMessage('system', msg.message || 'Error');
          stateBadge.classList.add('error');
          g2Show(msg.message || 'Error');
          setTimeout(() => { if (state !== 'LISTENING') setState('IDLE'); }, 3000);
          break;

        case 'state':
          if (msg.state === 'IDLE') setState('IDLE');
          break;
      }
    }

    function uint8ToBase64(uint8) {
      let binary = '';
      for (let i = 0; i < uint8.byteLength; i++) binary += String.fromCharCode(uint8[i]);
      return btoa(binary);
    }

    async function main() {
      log('Booting J.A.R.V.I.S...');
      addChatMessage('system', 'Inizializzazione sistema...');
      try {
        await initBridge();
        log('Neural interface online');
      } catch (e) {
        log(`Bridge init failed: ${e.message}`, true);
      }
      connectWs();
    }

    main();
  </script>
</body>
</html>
