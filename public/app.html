<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis AI - Even G2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0a0a0a; color: #00ff88;
      padding: 16px; min-height: 100vh;
    }
    h1 { font-size: 18px; margin-bottom: 8px; }
    #state { font-size: 14px; color: #888; margin-bottom: 12px; }
    #display {
      background: #111; border: 1px solid #222;
      border-radius: 8px; padding: 12px;
      font-size: 14px; min-height: 80px;
      white-space: pre-wrap; word-wrap: break-word;
      margin-bottom: 12px;
    }
    #log {
      font-size: 11px; color: #555;
      max-height: 200px; overflow-y: auto;
      border-top: 1px solid #222; padding-top: 8px;
    }
    .log-entry { margin-bottom: 2px; }
    .err { color: #ff4444; }
  </style>
</head>
<body>
  <h1>Jarvis AI</h1>
  <div id="state">Initializing...</div>
  <div id="display">--</div>
  <div id="log"></div>

  <script type="module">
    // ─── Configuration ───────────────────────────────────────
    const BRIDGE_WS_URL = '%%WS_URL%%';
    const CONTAINER_ID = 1;
    const CONTAINER_NAME = 'main';

    // ─── State ───────────────────────────────────────────────
    let state = 'INIT'; // INIT, IDLE, LISTENING, PROCESSING, DISPLAYING
    let bridge = null;
    let ws = null;
    let audioSeq = 0;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 5;

    // ─── Debug UI (visible on phone, not on glasses) ─────────
    const stateEl = document.getElementById('state');
    const displayEl = document.getElementById('display');
    const logEl = document.getElementById('log');

    function log(msg, isError = false) {
      console.log(`[Jarvis] ${msg}`);
      const div = document.createElement('div');
      div.className = 'log-entry' + (isError ? ' err' : '');
      div.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      logEl.prepend(div);
      // Keep log short
      while (logEl.children.length > 50) logEl.lastChild.remove();
    }

    function setState(newState) {
      state = newState;
      stateEl.textContent = `State: ${state}`;
      log(`State → ${state}`);
    }

    // ─── G2 Display helpers ──────────────────────────────────
    async function g2Show(text) {
      displayEl.textContent = text;
      if (!bridge) return;
      try {
        await bridge.textContainerUpgrade({
          containerID: CONTAINER_ID,
          containerName: CONTAINER_NAME,
          content: text
        });
      } catch (e) {
        log(`Display error: ${e.message}`, true);
      }
    }

    // ─── Even Hub SDK Initialization ─────────────────────────
    async function initBridge() {
      log('Loading Even Hub SDK...');

      try {
        // Try importing SDK from CDN
        const sdk = await import('https://esm.sh/@evenrealities/even_hub_sdk');

        if (sdk.waitForEvenAppBridge) {
          log('SDK loaded, waiting for bridge...');
          bridge = await sdk.waitForEvenAppBridge();
        } else if (sdk.EvenAppBridge) {
          bridge = sdk.EvenAppBridge.getInstance();
        }

        log('Bridge ready via SDK');
        await setupDisplay(sdk);
        setupEvents();
        return;
      } catch (e) {
        log(`SDK import failed: ${e.message}`, true);
      }

      // Fallback: poll for injected global
      log('Trying window global fallback...');
      bridge = await new Promise((resolve, reject) => {
        let attempts = 0;
        const check = () => {
          attempts++;
          const b = window.EvenAppBridge
            || window.evenAppBridge
            || window.bridge;
          if (b) {
            const inst = typeof b.getInstance === 'function' ? b.getInstance() : b;
            resolve(inst);
          } else if (attempts > 50) {
            reject(new Error('Bridge not found after 5s'));
          } else {
            setTimeout(check, 100);
          }
        };
        check();
      });

      log('Bridge ready via global');
      await setupDisplay(null);
      setupEvents();
    }

    async function setupDisplay(sdk) {
      log('Creating display container...');
      try {
        if (sdk && sdk.CreateStartUpPageContainer && sdk.TextContainerProperty) {
          // Use SDK classes
          const result = await bridge.createStartUpPageContainer(
            new sdk.CreateStartUpPageContainer({
              containerTotalNum: 1,
              textObject: [
                new sdk.TextContainerProperty({
                  containerID: CONTAINER_ID,
                  containerName: CONTAINER_NAME,
                  xPosition: 0,
                  yPosition: 0,
                  width: 576,
                  height: 288,
                  content: 'Jarvis AI\nConnecting...',
                  borderWidth: 0,
                  borderColor: 0,
                  borderRdaius: '0',
                  paddingLength: 8,
                  isEventCapture: 1
                })
              ]
            })
          );
          log(`Container created (result: ${result})`);
        } else {
          // Fallback: use callEvenApp with raw JSON
          const result = await bridge.callEvenApp('createStartUpPageContainer', {
            containerTotalNum: 1,
            textObject: [{
              containerID: CONTAINER_ID,
              containerName: CONTAINER_NAME,
              xPosition: 0,
              yPosition: 0,
              width: 576,
              height: 288,
              content: 'Jarvis AI\nConnecting...',
              borderWidth: 0,
              borderColor: 0,
              borderRdaius: '0',
              paddingLength: 8,
              isEventCapture: 1
            }]
          });
          log(`Container created via callEvenApp (result: ${result})`);
        }
      } catch (e) {
        log(`Container creation error: ${e.message}`, true);
      }
    }

    function setupEvents() {
      log('Registering event handlers...');

      bridge.onEvenHubEvent((event) => {
        // ─── Touch / click events ──────────────────────
        if (event.textEvent) {
          const evType = event.textEvent.eventType;
          // CLICK_EVENT = 0 (may appear as undefined)
          if (evType === 0 || evType === undefined) {
            handleTap();
          }
          // DOUBLE_CLICK_EVENT = 3
          else if (evType === 3) {
            handleDoubleTap();
          }
          // SCROLL_BOTTOM_EVENT = 2
          else if (evType === 2) {
            handleScrollDown();
          }
          // SCROLL_TOP_EVENT = 1
          else if (evType === 1) {
            handleScrollUp();
          }
        }

        // ─── Audio PCM data ────────────────────────────
        if (event.audioEvent && event.audioEvent.audioPcm) {
          handleAudioPcm(event.audioEvent.audioPcm);
        }

        // ─── System events ─────────────────────────────
        if (event.sysEvent) {
          const evType = event.sysEvent.eventType;
          // FOREGROUND_EXIT = 5
          if (evType === 5) {
            log('App backgrounded');
          }
          // FOREGROUND_ENTER = 4
          else if (evType === 4) {
            log('App foregrounded');
          }
          // ABNORMAL_EXIT = 6
          else if (evType === 6) {
            log('Abnormal exit', true);
          }
        }
      });

      log('Events registered');
    }

    // ─── Interaction handlers ────────────────────────────────

    // TAP toggles mic in IDLE/LISTENING, navigates pages in DISPLAYING
    function handleTap() {
      log(`Tap in state: ${state}`);

      if (state === 'IDLE') {
        startRecording();
      } else if (state === 'LISTENING') {
        stopRecording();
      } else if (state === 'DISPLAYING') {
        // Navigate to next page
        wsSend({ type: 'touchbar', event: 'TAP' });
      }
    }

    function handleDoubleTap() {
      log('Double tap → reset');
      if (state === 'LISTENING') {
        bridge.audioControl(false).catch(() => {});
      }
      wsSend({ type: 'touchbar', event: 'DOUBLE_TAP' });
      setState('IDLE');
      g2Show('Jarvis AI\nTap to speak');
    }

    function handleScrollDown() {
      if (state === 'DISPLAYING') {
        log('Scroll down → next page');
        wsSend({ type: 'touchbar', event: 'TAP' });
      }
    }

    function handleScrollUp() {
      if (state === 'DISPLAYING') {
        log('Scroll up → prev page');
        wsSend({ type: 'page_prev' });
      }
    }

    async function startRecording() {
      setState('LISTENING');
      audioSeq = 0;
      g2Show('Listening...');
      wsSend({ type: 'touchbar', event: 'LONG_PRESS_START' });

      try {
        await bridge.audioControl(true);
        log('Mic ON');
      } catch (e) {
        log(`Mic error: ${e.message}`, true);
        setState('IDLE');
        g2Show('Mic error\nTap to retry');
      }
    }

    async function stopRecording() {
      setState('PROCESSING');
      g2Show('Processing...');

      try {
        await bridge.audioControl(false);
        log('Mic OFF');
      } catch (e) {
        log(`Mic off error: ${e.message}`, true);
      }

      wsSend({ type: 'audio_end' });
    }

    function handleAudioPcm(pcmData) {
      if (state !== 'LISTENING') return;

      // pcmData is Uint8Array - convert to base64
      const base64 = uint8ToBase64(pcmData);
      wsSend({
        type: 'audio_pcm',
        data: base64,
        sequence: audioSeq++
      });
    }

    // ─── WebSocket to Bridge ─────────────────────────────────

    function connectWs() {
      log(`Connecting to ${BRIDGE_WS_URL}...`);

      ws = new WebSocket(BRIDGE_WS_URL);

      ws.onopen = () => {
        reconnectAttempts = 0;
        log('Bridge connected');
        setState('IDLE');
        g2Show('Jarvis AI\nTap to speak');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleBridgeMessage(msg);
        } catch (e) {
          log(`Parse error: ${e.message}`, true);
        }
      };

      ws.onclose = () => {
        log('Bridge disconnected');
        scheduleReconnect();
      };

      ws.onerror = (e) => {
        log('WS error', true);
      };
    }

    function scheduleReconnect() {
      if (reconnectAttempts >= MAX_RECONNECT) {
        log('Max reconnect attempts', true);
        g2Show('Offline\nRestart app');
        return;
      }
      reconnectAttempts++;
      const delay = Math.min(2000 * Math.pow(2, reconnectAttempts - 1), 30000);
      log(`Reconnecting in ${delay}ms (${reconnectAttempts}/${MAX_RECONNECT})`);
      setTimeout(connectWs, delay);
    }

    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
      } else {
        log('WS not connected, message dropped', true);
      }
    }

    function handleBridgeMessage(msg) {
      log(`Bridge: ${msg.type}`);

      switch (msg.type) {
        case 'status':
          g2Show(msg.message || '');
          break;

        case 'display':
          setState('DISPLAYING');
          let text = msg.text || '';
          if (msg.total && msg.total > 1) {
            text += `\n\n[${msg.page}/${msg.total}]`;
          }
          g2Show(text);
          break;

        case 'clear':
          g2Show('');
          break;

        case 'error':
          g2Show(msg.message || 'Error');
          // Return to IDLE after error
          setTimeout(() => {
            if (state !== 'LISTENING') {
              setState('IDLE');
              g2Show('Jarvis AI\nTap to speak');
            }
          }, 3000);
          break;

        case 'state':
          // Bridge-driven state update
          if (msg.state === 'IDLE') {
            setState('IDLE');
          }
          break;
      }
    }

    // ─── Utilities ───────────────────────────────────────────

    function uint8ToBase64(uint8) {
      let binary = '';
      const len = uint8.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(uint8[i]);
      }
      return btoa(binary);
    }

    // ─── Boot ────────────────────────────────────────────────

    async function main() {
      log('Jarvis AI starting...');

      try {
        await initBridge();
        log('G2 bridge initialized');
      } catch (e) {
        log(`Bridge init failed: ${e.message}`, true);
        // Continue anyway - WS still works for debugging
      }

      connectWs();
    }

    main();
  </script>
</body>
</html>
