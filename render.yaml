services:
  - type: web
    name: even-openclaw-bridge
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENCLAW_WS
        value: ws://host.docker.internal:18789
        # Change this to your OpenClaw gateway URL
      - key: OPENAI_API_KEY
        sync: false
        # Set this in Render dashboard after deploy
    healthCheckPath: /health
